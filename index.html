<style>

    font-weight: 700;
    font-size: 21px;
    color: #f9e04b;
    letter-spacing: -0.5px;
    pointer-events: none;
    user-select: none;
    position: absolute;
    top: 64%;
    left: 36%;
    transform: translate(-50%, -50%);
  }
  #controls { display: flex; gap: 8px; align-items: center; padding-bottom: 4px; }
  #resetBtn { font-family: 'Libre Baskerville', serif; font-size: 11px; padding: 2px 10px; border-radius: 10px; border: 0.5px solid #2d5a1b; background: transparent; color: #2d5a1b; cursor: pointer; }
  #dots { display: flex; gap: 3px; }
</style>

  function updateDots() {
    var d = document.getElementById('dots');
    d.innerHTML = '';
    for (var i = 0; i < Math.min(sessions, 8); i++) {
      var dot = document.createElement('div');
      dot.style.width = '5px';
      dot.style.height = '5px';
      dot.style.borderRadius = '50%';
      dot.style.background = '#2d5a1b';
      d.appendChild(dot);
    }
  }

  document.getElementById('tomato-btn').addEventListener('click', function() {
    if (running) {
      clearInterval(timer);
      running = false;
    } else {
      if (remaining === 0) remaining = total;
      running = true;
      timer = setInterval(function() {
        remaining--;
        updateDisplay();
        if (remaining <= 0) {
          clearInterval(timer);
          running = false;
          sessions++;
          updateDots();
        }
      }, 1000);
    }
  });

  document.getElementById('resetBtn').addEventListener('click', function() {
    clearInterval(timer);
    running = false;
    remaining = total;
    updateDisplay();
  });
})();
</script>

</body>
</html>
